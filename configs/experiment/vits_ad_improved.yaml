# @package _global_
# Improved PatchTraj configuration for closing the baseline gap.
# Changes vs default: larger model (d_model=384, n_layers=3), longer context (K=12),
# lower learning rate, more patience, and optimized smooth settings.
defaults:
  - /model: dinov2_base
  - /data: smd
  - /render: line_plot
  - _self_

# PatchTraj predictor — larger model
patchtraj:
  K: 12                   # Increased from 8 (more temporal context)
  delta: 1                # Prediction horizon
  d_model: 384            # Increased from 256 (more capacity)
  n_heads: 6              # Increased from 4 (must divide d_model)
  n_layers: 3             # Increased from 2 (deeper)
  dim_feedforward: 1536   # 4x d_model
  dropout: 0.1
  activation: gelu
  correspondence_mode: geometric
  use_identity_pi: false
  ot_reg: 0.1
  ot_max_iterations: 100
  ot_tolerance: 1.0e-3

# Training — more conservative
training:
  epochs: 150
  batch_size: 32          # Reduced from 64 (larger model needs less batch)
  lr: 3.0e-4              # Reduced from 1e-3
  weight_decay: 1.0e-5
  scheduler: cosine
  warmup_epochs: 10       # Increased from 5
  loss: huber
  huber_delta: 1.0
  trimmed_ratio: 0.10
  patience: 20            # Increased from 10
  seed: 42

# Scoring — optimized smooth settings + dual signal
scoring:
  lambda_disagree: 1.0
  alpha: 0.01
  calib_window: 2000
  smooth_window: 21       # Increased from 5 (from grid search)
  smooth_method: mean     # Configurable method
  # Dual-signal scoring: trajectory + distributional distance.
  # Required by the paper's spatial+dual multi-seed claim — keeping it
  # disabled here was the source of Critical Audit 5.
  dual_signal:
    enabled: true
    alpha: 0.1            # Distribution-heavy default (matches LP α-sweep optimum)
    auto_alpha: false     # Fixed-alpha policy (validation heuristic disabled)

multiscale:
  enabled: false
  results_dir: null
  entity: null
  method: rank_weighted
  window_sizes: [50, 100, 200]
  renderers: []

# CalibGuard
calibguard:
  enabled: false
  alpha_values: [0.01, 0.05, 0.10]
  calibration_ratio: 0.5
  rolling_window: 0
  drift_sigma: 3.0

# Experiment tracking
wandb:
  project: vits
  entity: null
  tags:
    - patchtraj
    - improved
    - phase4

# Output
output_dir: results/${model.name}_${data.name}_${render.name}_improved
